  v2ray: {sessions: 100, scenario_version: v2ray_vless_tcp_tls_v1, scenario_config: ../v2ray.yaml}
  shadowsocks: {sessions: 100, scenario_version: shadowsocks_rust_v1, scenario_config: ../shadowsocks.yaml}
