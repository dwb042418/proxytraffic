version: "3.8"

services:
  collector:
    image: python:3.11-slim
    container_name: etip-collector
    command: ["sleep", "infinity"]
    networks:
      etip-lab:
        ipv4_address: 172.28.0.10
    volumes:
      - ../:/workspace/encrypted_traffic_platform
      - ../dataset/output:/workspace/dataset
    cap_add:
      - NET_ADMIN
      - NET_RAW

  proxy-v2ray:
    image: v2fly/v2fly-core:latest
    container_name: etip-proxy-v2ray
    command: ["run", "-c", "/etc/v2ray/config.json"]
    profiles: ["proxy"]
    networks:
      etip-lab:
        ipv4_address: 172.28.0.20
    volumes:
      - ./proxy/v2ray/config.json:/etc/v2ray/config.json:ro

  proxy-shadowsocks:
    image: ghcr.io/shadowsocks/ssserver-rust:latest
    container_name: etip-proxy-shadowsocks
    profiles: ["proxy"]
    networks:
      etip-lab:
        ipv4_address: 172.28.0.21
    environment:
      - SERVER_ADDR=0.0.0.0
      - SERVER_PORT=8388
      - METHOD=2022-blake3-aes-128-gcm
      - PASSWORD=replace-with-lab-secret

  proxy-clash:
    image: dreamacro/clash:latest
    container_name: etip-proxy-clash
    profiles: ["proxy"]
    networks:
      etip-lab:
        ipv4_address: 172.28.0.22
    volumes:
      - ./proxy/clash/config.yaml:/root/.config/clash/config.yaml:ro

networks:
  etip-lab:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
